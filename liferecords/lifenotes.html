  <style>
    /* 沿用主页的配色和字体 */
    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      line-height: 1.7;
      color: #333;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
      min-height: 100vh;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    h1 {
      color: #1e40af;
      background: linear-gradient(90deg, #1e40af, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* 返回按钮 */
    .back-link {
      display: inline-block;
      margin-bottom: 2rem;
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
    }
    .back-link:hover { text-decoration: underline; }

    /* 博客列表容器 */
    .blog-list {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* 博客条目卡片样式 */
    .blog-item {
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      transition: transform 0.3s ease;
      text-decoration: none;
      color: inherit;
      border-left: 5px solid #3b82f6;
    }

    .blog-item:hover {
      transform: translateX(10px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.15);
    }

    .blog-date {
      font-size: 0.85rem;
      color: #6b7280;
      margin-bottom: 0.5rem;
    }

    .blog-title {
      font-size: 1.25rem;
      font-weight: bold;
      color: #1e40af;
      margin-bottom: 0.5rem;
    }

    .blog-summary {
      font-size: 0.95rem;
      color: #4b5563;
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      color: #6b7280;
      font-size: 0.9rem;
    }
	/* ========================================= */
    /* 悬浮功能按钮样式 (右下角) */
    /* ========================================= */
    .floating-buttons {
      position: fixed;
      bottom: 30px;
      right: 30px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 1000;
    }

    .float-btn {
      width: 48px;
      height: 48px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 50%;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      opacity: 0.85;
      position: relative;
    }

    .float-btn:hover {
      background-color: #1e40af;
      transform: translateY(-3px);
      opacity: 1;
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
    }

    /* 电脑端鼠标悬浮时的文字提示 (Tooltip) */
    .float-btn::after {
      content: attr(data-tooltip);
      position: absolute;
      right: 60px;
      background-color: rgba(0,0,0,0.7);
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 0.85rem;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .float-btn:hover::after {
      opacity: 1;
    }

    /* 4. 响应式设计：针对手机和平板屏幕的优化 */
    @media (max-width: 768px) {
      body {
        padding: 1rem; 
      }
      .game-list {
        padding: 0.5rem; 
      }
      table {
        border-spacing: 8px; 
      }
      th, td {
        padding: 8px; 
        font-size: 0.95rem; 
      }
      
      /* 手机端稍微调整悬浮按钮的大小和位置 */
      .floating-buttons {
        bottom: 20px;
        right: 20px;
      }
      .float-btn {
        width: 42px;
        height: 42px;
      }
      .float-btn svg {
        width: 20px;
        height: 20px;
      }
      /* 手机端隐藏悬浮文字提示，以免阻挡视线 */
      .float-btn::after {
        display: none; 
      }
  </style>
</head>
