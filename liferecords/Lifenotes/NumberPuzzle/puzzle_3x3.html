<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 x 3 数字拼图</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --board-bg: #bbada0;
            --tile-default: #eee4da;
            --tile-correct: #d4edda;
            --text-dark: #776e65;
            --primary-btn: #8f7a66;
            --ai-btn: #4a90e2;
            --custom-btn: #27ae60;
        }

        body {
            font-family: 'Segoe UI', "Microsoft YaHei", sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; margin: 0; background-color: var(--bg-color);
        }

        .main-container { display: flex; gap: 20px; align-items: flex-start; transition: all 0.5s ease; }
        .game-side { text-align: center; }

        .stats-container {
            display: flex; gap: 20px; margin-bottom: 15px;
            font-size: 1.1rem; font-weight: bold; color: #555; justify-content: center;
        }

        .puzzle-board {
            display: grid; grid-template-columns: repeat(3, 90px);
            grid-template-rows: repeat(3, 90px); gap: 10px;
            background-color: var(--board-bg); padding: 10px;
            border-radius: 8px; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .tile {
            width: 90px; height: 90px; background-color: var(--tile-default);
            color: var(--text-dark); display: flex; align-items: center;
            justify-content: center; font-size: 32px; font-weight: bold;
            border-radius: 4px; cursor: pointer; user-select: none; transition: all 0.15s;
        }

        .tile.correct { background-color: var(--tile-correct); color: #155724; }
        .tile.empty { background-color: #cdc1b4; cursor: default; }

        .controls { margin-top: 20px; }
        .btn-group { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; max-width: 320px;}

        button {
            padding: 10px 14px; font-size: 14px; color: white;
            background-color: var(--primary-btn); border: none;
            border-radius: 5px; cursor: pointer; font-weight: bold; transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button.ai-btn { background-color: var(--ai-btn); }
        button.custom-btn { background-color: var(--custom-btn); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        /* 日志栏 */
        .log-side {
            width: 290px; height: 390px;
            background: white; border-radius: 8px;
            border: 1px solid #ddd; display: none;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .log-header { padding: 12px; background: #f8f9fa; border-bottom: 1px solid #ddd; font-weight: bold; border-radius: 8px 8px 0 0; }
        #solve-log { flex: 1; padding: 12px; overflow-y: auto; font-size: 13px; line-height: 1.8; color: #555; scroll-behavior: smooth; }
        .log-entry { border-bottom: 1px solid #f1f1f1; padding: 5px 0; }
        .log-entry b { color: var(--ai-btn); }
        .pos-info { color: #e67e22; font-family: monospace; }

        /* 加载遮罩 */
        .loading-overlay {
            display: none; position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(255,255,255,0.7); align-items: center; justify-content: center;
            z-index: 10; font-weight: bold; color: var(--ai-btn); border-radius: 8px;
        }

        /* 弹窗基类 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 100;
            backdrop-filter: blur(2px);
        }
        .modal { background: white; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 5px 25px rgba(0,0,0,0.2); }

        /* 自定义输入界面特定样式 */
        .custom-grid {
            display: grid; grid-template-columns: repeat(3, 60px);
            gap: 10px; margin: 20px 0; justify-content: center;
        }
        .custom-grid input {
            width: 60px; height: 60px; text-align: center;
            font-size: 28px; font-weight: bold; border: 2px solid #ddd;
            border-radius: 5px; color: var(--text-dark);
        }
        .custom-grid input:focus { border-color: var(--custom-btn); outline: none; }
        .error-msg { color: #e74c3c; font-size: 14px; min-height: 20px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="main-container" id="main-container">
        <div class="game-side">
            <h1>3×3 拼图求解</h1>
            <div class="stats-container">
                <div>步数: <span id="move-count">0</span></div>
                <div>时间: <span id="timer">0</span>s</div>
            </div>

            <div class="puzzle-board" id="board">
                <div class="loading-overlay" id="loading">计算中...</div>
            </div>

            <div class="controls">
                <div class="btn-group">
                    <button id="undo-btn" onclick="undoMove()">撤销</button>
                    <button onclick="initGame()">洗牌</button>
                    <button class="custom-btn" onclick="showCustomModal()">自定义</button>
                    <button class="ai-btn" id="ai-btn" onclick="solveAI()">AI 解答</button>
                </div>
            </div>
        </div>

        <div class="log-side" id="log-side">
            <div class="log-header">AI 解题轨迹</div>
            <div id="solve-log"></div>
        </div>
    </div>

    <div class="modal-overlay" id="win-modal">
        <div class="modal">
            <h2>🎉 恭喜通关！</h2>
            <p id="result-text"></p>
            <button onclick="closeModal('win-modal')">确认</button>
        </div>
    </div>

    <div class="modal-overlay" id="custom-modal">
        <div class="modal" style="width: 280px;">
            <h3 style="margin-top: 0;">设置自定义谜题</h3>
            <p style="font-size: 13px; color: #666; margin: 0;">输入 1-8 的数字，空格请填 0 或留空。</p>
            
            <div class="custom-grid" id="custom-input-grid">
                </div>
            
            <div class="error-msg" id="custom-error"></div>
            
            <div class="btn-group" style="width: 100%; justify-content: space-between;">
                <button class="btn-reset" style="background: #95a5a6;" onclick="closeModal('custom-modal')">取消</button>
                <button style="background: #e67e22;" onclick="fillSolvableRandom()">全乱序</button>
                <button class="custom-btn" onclick="submitCustomPuzzle()">开始</button>
            </div>
        </div>
    </div>

    <script>
        const size = 3;
        let tiles = [];
        let moves = 0;
        let history = [];
        let timerInterval, seconds = 0, isGameStarted = false, isSolving = false;

        const boardElement = document.getElementById('board');
        const logSide = document.getElementById('log-side');
        const logElement = document.getElementById('solve-log');

        // 初始化
        function initGame() {
            clearInterval(timerInterval);
            seconds = 0; moves = 0; history = []; isGameStarted = false; isSolving = false;
            tiles = [...Array(size * size).keys()].map(x => (x + 1) % (size * size));
            shuffle();
            updateUI();
            logSide.style.display = 'none';
            render();
        }

        // 核心渲染
        function render() {
            boardElement.querySelectorAll('.tile').forEach(el => el.remove());
            tiles.forEach((tile, index) => {
                const div = document.createElement('div');
                div.className = `tile ${tile === 0 ? 'empty' : (tile === index + 1 ? 'correct' : '')}`;
                div.innerText = tile || '';
                // 只有在非AI解答模式且非空格时才能点击
                if (tile !== 0 && !isSolving) div.onclick = () => moveTile(index);
                boardElement.appendChild(div);
            });
        }

        // --- 移动逻辑 ---
        function getPosName(index) {
            return `(${Math.floor(index / size) + 1},${(index % size) + 1})`;
        }

        function moveTile(index, record = true) {
            const emptyIdx = tiles.indexOf(0);
            if (isAdjacent(index, emptyIdx)) {
                if (!isGameStarted && !isSolving) { startTimer(); isGameStarted = true; }
                if (record) history.push([...tiles]);
                
                const movedVal = tiles[index];
                const fromPos = getPosName(index);
                const toPos = getPosName(emptyIdx);

                [tiles[index], tiles[emptyIdx]] = [tiles[emptyIdx], tiles[index]];
                moves++;
                updateUI();
                render();
                checkWin();
                
                return { val: movedVal, from: fromPos, to: toPos };
            }
            return null;
        }

        function isAdjacent(i1, i2) {
            const r1 = Math.floor(i1/size), c1 = i1%size, r2 = Math.floor(i2/size), c2 = i2%size;
            return Math.abs(r1-r2) + Math.abs(c1-c2) === 1;
        }

        // --- AI 解答与日志 ---
        async function solveAI() {
            if (isSolving) return;
            isSolving = true;
            
            logSide.style.display = 'flex';
            logElement.innerHTML = "<b>AI 开始分析当前局面...</b><br>";
            document.getElementById('loading').style.display = 'flex';

            await new Promise(r => setTimeout(r, 200)); // 给UI一点响应时间
            const path = findAStarPath();
            document.getElementById('loading').style.display = 'none';

            if (path) {
                logElement.innerHTML = `<b>分析完成，最优解共 ${path.length} 步：</b><br>`;
                for (let i = 0; i < path.length; i++) {
                    const nextState = path[i];
                    const clickIdx = nextState.indexOf(0); 
                    
                    const stepInfo = moveTile(clickIdx, true);
                    
                    const entry = document.createElement('div');
                    entry.className = 'log-entry';
                    entry.innerHTML = `步序 ${i+1}: 数字 <b>${stepInfo.val}</b> 从 <span class="pos-info">${stepInfo.from}</span> 移动至 <span class="pos-info">${stepInfo.to}</span>`;
                    logElement.appendChild(entry);
                    logElement.scrollTop = logElement.scrollHeight;

                    // 动画速度，自定义谜题步数可能较多，稍微加快一点
                    await new Promise(r => setTimeout(r, 350));
                }
                logElement.innerHTML += "<br><b>解答完毕。</b>";
            } else {
                logElement.innerHTML = "<b>出错了！</b> AI 未能找到解法（这不应该发生）。";
            }
            isSolving = false;
        }

        // A* 算法
        function findAStarPath() {
            const goal = [...Array(9).keys()].map(x => (x + 1) % 9).join(',');
            // 如果已经是目标状态，直接返回空路径
            if (tiles.join(',') === goal) return [];

            let open = [{ state: [...tiles], g: 0, h: getH(tiles), parent: null }];
            let closed = new Set();

            while (open.length > 0) {
                open.sort((a,b) => (a.g + a.h) - (b.g + b.h));
                let curr = open.shift();
                if (curr.state.join(',') === goal) {
                    let path = [];
                    while(curr.parent) { path.unshift(curr.state); curr = curr.parent; }
                    return path;
                }
                closed.add(curr.state.join(','));
                const e = curr.state.indexOf(0);
                const r = Math.floor(e/3), c = e%3;
                [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc]) => {
                    if(nr>=0&&nr<3&&nc>=0&&nc<3) {
                        const ni = nr*3+nc;
                        let ns = [...curr.state];
                        [ns[e], ns[ni]] = [ns[ni], ns[e]];
                        if(!closed.has(ns.join(','))) open.push({ state:ns, g:curr.g+1, h:getH(ns), parent:curr });
                    }
                });
            }
            return null; // 无解
        }

        function getH(s) {
            return s.reduce((acc, v, i) => {
                if(v===0) return acc;
                const t=v-1; return acc+Math.abs(Math.floor(i/3)-Math.floor(t/3))+Math.abs(i%3-t%3);
            }, 0);
        }

        // --- 自定义谜题逻辑 ---
        function showCustomModal() {
            const grid = document.getElementById('custom-input-grid');
            grid.innerHTML = ''; // 清空
            document.getElementById('custom-error').innerText = ''; // 清空错误

            // 生成9个输入框
            for (let i = 0; i < 9; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.maxLength = 1;
                input.autocomplete = 'off';
                input.id = `c-input-${i}`;
                // 输入时自动跳到下一个
                input.oninput = function() {
                    if (this.value && i < 8) document.getElementById(`c-input-${i+1}`).focus();
                };
                grid.appendChild(input);
            }
            document.getElementById('custom-modal').style.display = 'flex';
            document.getElementById('c-input-0').focus(); // 聚焦第一个
        }

        // 核心验证：检查数学上有解
        function isSolvable(arr) {
            let inversions = 0;
            // 计算逆序对 (不包括0)
            for (let i = 0; i < arr.length - 1; i++) {
                for (let j = i + 1; j < arr.length; j++) {
                    if (arr[i] !== 0 && arr[j] !== 0 && arr[i] > arr[j]) {
                        inversions++;
                    }
                }
            }
            // 3x3拼图，空格在最后一行，逆序对数量必须为偶数才有解
            return inversions % 2 === 0;
        }

        function submitCustomPuzzle() {
            const newTiles = [];
            const errorEl = document.getElementById('custom-error');
            errorEl.innerText = '';

            // 获取输入
            for (let i = 0; i < 9; i++) {
                const val = document.getElementById(`c-input-${i}`).value.trim();
                const num = val === '' ? 0 : parseInt(val);
                if (isNaN(num) || num < 0 || num > 8) {
                    errorEl.innerText = "❌ 请输入 0-8 之间的数字。";
                    return;
                }
                newTiles.push(num);
            }

            // 验证：必须包含 0-8
            const checkSet = new Set(newTiles);
            if (checkSet.size !== 9) {
                errorEl.innerText = "❌ 数字不能重复，必须包含 0-8。";
                return;
            }

            // 验证：必须有解
            if (!isSolvable(newTiles)) {
                errorEl.innerText = "❌ 抱歉，该数字布局数学上无解，请修改。";
                // 高亮逆序对可能比较复杂，这里只做提示
                return;
            }

            // 成功，应用谜题
            tiles = newTiles;
            closeModal('custom-modal');
            
            // 重置游戏状态
            clearInterval(timerInterval);
            seconds = 0; moves = 0; history = []; isGameStarted = false; isSolving = false;
            updateUI();
            logSide.style.display = 'none';
            logElement.innerHTML = "已应用自定义谜题。";
            render();
        }

        // 快捷键：生成一个确保有解的随机乱序
        function fillSolvableRandom() {
            let arr;
            do {
                arr = [...Array(9).keys()];
                // 随机洗牌
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
            } while (!isSolvable(arr)); // 如果洗出无解的，重来

            // 填充输入框
            for (let i = 0; i < 9; i++) {
                document.getElementById(`c-input-${i}`).value = arr[i] === 0 ? '' : arr[i];
            }
            document.getElementById('custom-error').innerText = "✅ 已填充随机有解布局。";
        }

        // --- 通用辅助 ---
        function startTimer() { timerInterval = setInterval(() => { seconds++; document.getElementById('timer').innerText = seconds; }, 1000); }
        function updateUI() { 
            document.getElementById('move-count').innerText = moves;
            document.getElementById('timer').innerText = seconds;
            document.getElementById('undo-btn').disabled = history.length === 0 || isSolving;
            document.getElementById('ai-btn').disabled = isSolving;
        }
        // 游戏洗牌：模拟移动保证有解
        function shuffle() {
            for(let i=0; i<60; i++) {
                const e = tiles.indexOf(0), r = Math.floor(e/3), c = e%3, adj = [];
                if(r>0) adj.push(e-3); if(r<2) adj.push(e+3); if(c>0) adj.push(e-1); if(c<2) adj.push(e+1);
                const m = adj[Math.floor(Math.random()*adj.length)];
                [tiles[e], tiles[m]] = [tiles[m], tiles[e]];
            }
        }
        function undoMove() { if(history.length>0){ tiles=history.pop(); moves--; updateUI(); render(); } }
        function checkWin() {
            const goal = [...Array(9).keys()].map(x => (x + 1) % 9);
            if(tiles.every((v,i) => v === goal[i]) && (isGameStarted || isSolving)) {
                clearInterval(timerInterval);
                setTimeout(() => {
                    document.getElementById('result-text').innerText = `总步数：${moves}\n总耗时：${seconds}秒`;
                    document.getElementById('win-modal').style.display='flex';
                }, 300);
            }
        }
        function closeModal(id) { document.getElementById(id).style.display='none'; }

        initGame();
    </script>
</body>
</html>
