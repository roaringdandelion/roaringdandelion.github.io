<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RD's Game Life - 全成就总记录</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      line-height: 1.6;
    }
    .header {
      text-align: center;
      color: #16a34a; 
      margin-bottom: 2rem;
    }
    .game-list {
      margin: 2rem 0;
      padding: 1rem;
      background: #f0fdf4; 
      border-radius: 8px;
    }
    
    /* 新增：筛选器容器样式，放在右上角 */
    .filter-container {
      text-align: right;
      margin-bottom: 10px;
      padding-right: 15px;
      color: #166534;
      font-weight: bold;
    }
    .filter-container select {
      padding: 6px 12px;
      border: 1px solid #86efac;
      border-radius: 6px;
      background-color: white;
      color: #166534;
      font-family: inherit;
      cursor: pointer;
      font-size: 0.9em;
    }
    .filter-container select:focus {
      outline: none;
      border-color: #16a34a;
    }

    table {
      margin: 0 auto; 
      border-collapse: separate;
      border-spacing: 15px;
      width: 100%; 
    }
    th, td {
      padding: 15px; 
      text-align: center; 
    }
    th {
      border-bottom: 2px solid #86efac; 
      color: #166534; 
      cursor: pointer; 
      user-select: none; 
      transition: background-color 0.2s;
      white-space: nowrap; 
    }
    th:hover {
      background-color: #dcfce7;
      border-radius: 8px;
    }
    th::after {
      content: ' \21D5'; 
      font-size: 0.8em;
      color: #86efac;
      margin-left: 5px;
    }
    .year-divider td {
      font-weight: bold;
      color: #16a34a; 
      font-size: 1.1em;
      padding-top: 30px;
      padding-bottom: 5px;
      border-bottom: 1px dashed #bbf7d0; 
    }
    .footer-row td {
      padding-top: 40px; 
      color: #64748b; 
      font-style: italic;
    }
    
    .custom-link {
      color: inherit; 
      text-decoration: none; 
      transition: color 0.2s ease, font-weight 0.2s ease;
      display: inline-block;
    }
    .custom-link:hover {
      color: #15803d; 
      font-weight: bold;
    }
    .game-name-link {
      border-bottom: 1px dotted #16a34a;
    }
    .hltb-link {
      border-bottom: 1px dashed #86efac; 
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>生涯全成就游戏总记录</h1>
    <p>RoaringDandelion</p>
  </header>
  
  <div class="game-list">
    <div class="filter-container">
      <label for="platformFilter">平台检索：</label>
      <select id="platformFilter" onchange="filterTable()">
        <option value="All">全部平台</option>
        <option value="Steam">Steam</option>
        <option value="XBOX">XBOX</option>
        <option value="PlayStation">PlayStation</option>
        <option value="Nintendo Switch">Nintendo Switch</option>
      </select>
    </div>

    <table id="gameTable">
      <thead>
        <tr>
          <th onclick="sortTable('id')">编号</th>
          <th onclick="sortTable('name')">游戏名</th>
          <th onclick="sortTable('platform')">平台</th>
          <th onclick="sortTable('duration')">全成就时长</th>
          <th onclick="sortTable('date')">完成日期</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        </tbody>
    </table>
  </div>

  <script src="data.js"></script>

  <script>
    const tbody = document.getElementById('tableBody');
    
    // 新增：引入 currentData 变量，用于保存当前筛选后的数据状态
    let currentData = []; 
    let currentSortKey = '';
    let isAscending = false;

    function renderTable(data, showYearGroup = false) {
      tbody.innerHTML = ''; 
      let currentYear = '';

      // 如果筛选后没有数据，显示提示信息
      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="padding: 30px; color: #64748b;">该平台暂无全成就记录</td></tr>`;
        return;
      }

      data.forEach(game => {
        if (showYearGroup) {
          const gameYear = game.date.split('/')[0];
          if (gameYear !== currentYear) {
            currentYear = gameYear;
            tbody.innerHTML += `
              <tr class="year-divider">
                <td colspan="5">${currentYear}年度</td>
              </tr>
            `;
          }
        }

        const gameUrl = game.url ? game.url : '#';
        const searchName = game.engName ? game.engName : game.name;
        const hltbUrl = `https://howlongtobeat.com/?q=${encodeURIComponent(searchName)}`;
        const engNameAttr = game.engName ? `title="${game.engName}"` : '';

        tbody.innerHTML += `
          <tr>
            <td>${game.id}</td>
            <td>
              <a href="${gameUrl}" target="_blank" class="custom-link game-name-link" ${engNameAttr}>
                ${game.name}
              </a>
            </td>
            <td>${game.platform}</td>
            <td>
              <a href="${hltbUrl}" target="_blank" class="custom-link hltb-link" title="在 HowLongToBeat 查看全球时长">
                ${game.duration} Hours
              </a>
            </td>
            <td>${game.date}</td>
          </tr>
        `;
      });

      tbody.innerHTML += `
        <tr class="footer-row">
          <td colspan="5">...To Be Continued...</td>
        </tr>
      `;
    }

    // 新增：筛选功能逻辑
    function filterTable() {
      const platform = document.getElementById('platformFilter').value;
      
      // 切换平台时，重置排序状态，回归最原始的时间轴顺序
      currentSortKey = '';
      isAscending = false;

      if (platform === 'All') {
        currentData = [...gamesData];
      } else {
        // 过滤出符合所选平台的游戏
        currentData = gamesData.filter(game => game.platform === platform);
      }
      
      // 重新渲染表格，并恢复年份分组显示
      renderTable(currentData, true);
    }

    // 修改：排序功能现在对 currentData (当前筛选后的数据) 进行排序，而不是全局数据
    function sortTable(key) {
      if (currentSortKey === key) {
        isAscending = !isAscending;
      } else {
        currentSortKey = key;
        isAscending = true; 
      }

      currentData.sort((a, b) => {
        let valA = a[key];
        let valB = b[key];

        if (key === 'duration' || key === 'id') {
          let numA = parseFloat(valA) || 0; 
          let numB = parseFloat(valB) || 0;
          return isAscending ? numA - numB : numB - numA;
        } 
        else if (key === 'date') {
          let dateA = new Date(valA).getTime();
          let dateB = new Date(valB).getTime();
          return isAscending ? dateA - dateB : dateB - dateA;
        } 
        else {
          return isAscending 
            ? String(valA).localeCompare(String(valB), 'zh') 
            : String(valB).localeCompare(String(valA), 'zh');
        }
      });

      renderTable(currentData, false); 
    }

    // 页面首次加载时，初始化 currentData 并渲染
    window.onload = function() {
      currentData = [...gamesData];
      renderTable(currentData, true);
    };
  </script>
</body>
</html>
